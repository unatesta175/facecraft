# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST      — e.g. 54.255.93.4
#   EC2_USER      — e.g. ubuntu
#   EC2_SSH_KEY   — full contents of your .pem private key

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared contracts
        run: npm run build --workspace=packages/contracts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build API and web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build --workspace=apps/api && npm run build --workspace=apps/web

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/facecraft
            bash infrastructure/scripts/deploy.sh
